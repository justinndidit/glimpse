version: "3.9"

services:
  app:
    build: .
    container_name: glimpse_app
    env_file:
      - .env
    ports:
      - "${DOCKER_SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      seaweedfs:
        condition: service_started
    command: go run ./cmd/glimpse
    volumes:
      - .:/app
    working_dir: /app

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: '${DOCKER_DATABASE_NAME}'
      POSTGRES_USER: '${DOCKER_DATABASE_USER}'
      POSTGRES_PASSWORD: '${DOCKER_DATABASE_PASSWORD}'
    ports:
      - "${DOCKER_DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DOCKER_DATABASE_USER} -d ${DOCKER_DATABASE_NAME}"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8
    ports:
      - "${DOCKER_REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -dir=/data
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # SeaweedFS UI/API
    volumes:
      - seaweedfs_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data: